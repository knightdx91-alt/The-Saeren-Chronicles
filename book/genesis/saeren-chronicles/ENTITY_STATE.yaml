      ch3: "DEFIES THE NOTE (Tell her no): instead of pocketing her mother's silver rod-focus quietly, she walks to the front to KEEP it openly, on her own terms, in a crowded room — choosing to be seen choosing. Cost = trades anonymity (which she came to Hazel craving) for being the one who decides. Mrs. Zoran wakes the focus (it elongates to a glowing cane, 'practically begging'); Viridia now suspects she was 'measured' across time by whoever packed the focus, and resolves to learn whose footprints they are (cold, active wanting vs. passive destiny)."
      ch4: "BREAKS COVER on Lightwell's radar: told to be quiet behind Amber in the office, she steps out from behind Amber and openly argues for the Magical Warfare placement, revealing she wrote on Cote's quiz that the light mages were WRONG to put the dark lines to the sword. Lightwell grants the warfare/summoning request specifically because of what VIRIDIA showed, not only Amber's favor. Cost = consciously spends her anonymity; Lightwell now remembers her ('the most dangerous thing about you... you notice things and say them out loud in the wrong rooms')."
      ch5: "DEFIES AMBER'S 'start small' rule + OVER-POURS the pact/summoning-call: Amber made her promise to send the littlest call (3 soft pulses, a toad/finch). Viridia chooses instead to throw herself wholly open ('rather risk the bottom dropping out than bond a small thing that might not stay'), pours past her own bottom — orb burns WHITE-AND-BLACK at once (both halves; first felt 'complete'); gains first glimpse of the wood's mana-web. Cost = near-fatal drain (nosebleed, collapse), summons Lor-ar (far bigger than intended), and the over-pour rolls out past the named wood where a 'hungry thing in the dark' heard it (see open_mysteries). Lor-ar: 'you have announced yourself, the once, to a hungry thing in the dark.'"
      ch8: "Ripple line: her 'reaches past the safe edge' trait (shown Ch.3-5) tied to the True Bond with Raizen — the same refusal of the safe-small call that drew Lor-ar shapes the over-reaching bond."
      ch16: "TWO costly choices: (1) consciously OBEYS Lightwell's order and LEAVES Alice — chooses the eight girls behind Amber's failing shield over running 3 corridors for the one friend who loved her without wanting anything back. The loss of Alice is partly her own doing, owned, not done to her ('the worst thing she had ever done'). (2) Spends HIDDEN dark-side RUNE-CRAFT FROM COVER to decide the students' escape: while the captain talks, she inscribes an explosion rune from across the burning hall onto his staff, linked to his own protection rune (a 'death symbol' — a killing made of his own defense). Botches the third stroke (inverted, as on the iron bench), the bad line draws back into her — splits the skin of her left forearm, numbs two fingers — she lays a true line over it just in time. The captain's shield becomes a sealed bomb. She remained UNSEEN ('he had never seen Viridia at all'); hiding right is why she lived and why she could decide the eight's escape from cover."
    knows_at_ch15_end: "(adds to ch9) The ranking-test/Chancellor arc (Ch.12-14): excused from Intro-to-Magic class (Ch.12, no longer needed). THE WELL/SOURCE (Ch.14): touched the source of all magic; learned the pact (2nd war) + the DELIBERATE partial severing of mankind's dark-half connection (fear of equals, not monsters) = why dark mages are rare; the dark connection is frayed but NOT gone (might be mended — hope/hubris, untested); her core grew ~100x (was a 'hearth', now a 'furnace'); a personal THREAD with her mother (Bella) running DOWN into the source's depths that she could see but COULD NOT follow (Bk2 mystery); a strange ABSENCE at the rim of the world's lattice that the source itself flinches from (void precursor — abstract, no entity). Chancellor's cover story: the well only gives a larger core, once only, don't tell friends. She HID that her experience differed; lied to his trap-question ('did you see/hear anything?') with a worried face while he wore the glasses. THE THRESHOLD (Ch.15, via Amber): peace holds only until ONE more dark mage killed BY DECREE; then Jazen goes to war; if it breaks, Lightwell evacuates the dark-mage girls (incl. Viridia) to Jazen's camp."
