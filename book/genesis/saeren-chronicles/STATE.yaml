  genre: "Fantasy"
  subgenre: "YA epic/school fantasy"
  language: "English"
  word_count_target: 90000
  device: ""
  comp_titles:
    - "Leigh Bardugo — Grisha trilogy"
    - "Tamora Pierce — Tortall"
    - "Garth Nix — Old Kingdom"
  engagement_type: {primary: "emotional", secondary: "world-building", tertiary: "mystery"}
  premise: "The only person born with both halves of a deliberately-severed magic must survive a school built to suppress what it cannot categorize, while grief, a hidden heritage, and a coming war close in."
