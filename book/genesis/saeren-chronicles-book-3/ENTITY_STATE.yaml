  amber-summers:
    canonical_name: "Amber Summers"
    aliases: []
    importance: major
    physical:
      hair: { value: "long black, ponytail", source: "foundation" }
      nails: { value: "black, chipped/bitten", source: "foundation" }
      age: { value: "~18-19 (was 17-18 in Bk2)", at_chapter: 1, source: "foundation" }
    traits:
      - { trait: "DEFLECTS the true thing in jokes/crossness (dresses the true thing in the small cross thing — beans, etc.)", source: "ch-01:p103, ch-02:p103", mutable: false }
