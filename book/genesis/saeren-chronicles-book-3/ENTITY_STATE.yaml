    bond: { type: "summoned bond (not True-Bond)", current_status: "RELEASED to the forest (Bk2 Ch.19); worked the release by MEANING it (no sight needed); bond went QUIET, not broken — open onto a forest. Last word 'Little one,' at the tree-line, meant entire." }
    status_book3: "RELEASED / GONE from the active cast as of Book Two Ch.19. NOT seen in Bk3 Ch.1-4."
    open_threads: ["Whether Lor-ar returns for the balance finale (OPEN author decision, STATE.yaml)."]

  alice-pembrook:
    canonical_name: "Alice Pembrook"
    aliases: []
    importance: major
    physical:
      hair: { value: "long blond (lank when captive)", source: "foundation" }
      eyes: { value: "green", source: "foundation" }
      teeth: { value: "wide smile; ONE tooth turned out of line (the 'crooked tooth' — reappears when she forgets to be careful)", source: "foundation", note: "the change couldn't reach it; its return = her warmth coming back (ch-01:p71)." }
      build: { value: "a bit heavier / heavyset", source: "foundation" }
    traits:
      - { trait: "healer's 'calm hands'; the healer's wrist-grip that is a reading, not a comfort", source: "ch-02:p107", mutable: false }
      - { trait: "CHANGED/RECOVERING — calm, stilled, warmth banked-not-out, coming back a degree at a time across the year", source: "ch-01:p69-71", mutable: true }
      - { trait: "puts the lid on the dry-things box instead of asking (her way of answering)", source: "ch-02:p7, ch-04:p111", mutable: true }
    relationships:
