# ============================================================================
# LOCATIONS
# ============================================================================
locations:

  wend:
    canonical_name: "Wend (the valley / settlement)"
    aliases: ["the valley", "the settlement"]
    facts:
      - { fact: "a day and a half by the slow southern line from anywhere that ever mattered; a scatter of stone houses along a stream, terraced gardens up the slope, an orchard, a mill that still turns", source: "ch-01:p11" }
      - { fact: "~200 people folded into a place that held 40 (the rescued/survivors from the east road); gardens doubled", source: "ch-01:p11" }
      - { fact: "NOT hidden — no wards (the thing they hid from is gone). The long table behind the MILL is where Alice teaches the bowl-of-water lessons", source: "ch-01:p13, ch-01:p67" }
      - { fact: "key spots: the orchard (almond tree at the garden bottom — flowers register in the source-sense), the mill, the long table, the terraced gardens up to the HIGH WALL at the top (where Viridia reads the cold rim north)", source: "ch-01:p5, ch-04:p121" }
    distances:
      - { to: "hallow", value: "the slow line runs to Hallow then stops (bridge let go in winter, unmended — no capital to mend it)", source: "ch-02:p31" }
      - { to: "the-emptied-hamlet", value: "~3 days north on foot/horse past Hallow", source: "ch-02" }

  the-source-cavern:
    canonical_name: "the source-cavern (= the Book One cavern)"
    aliases: ["the well of all magic (physical location)", "the cavern"]
    DO_NOT_RE_RENDER: true
    facts:
      - { fact: "a LOW, ROUGH, UNWORKED-STONE chamber, older than old; a stone PEDESTAL holding a POOL that IS the source (not water). Reached by PORTAL/SEAM, not walked to.", source: "Bk1 Ch.14 / Bk2 Ch.18 (research/book2-chapter-18-rebirth.md)" }
      - { fact: "where the rebirth happened (Bk2 Ch.18): Viridia portaled in, put her hand in the pool, mended the severing for every living core at once, ALONE with the source. Bella's-name thread touched again at the same pedestal (still unfollowable).", source: "Bk2 Ch.18" }
    note: "ANY Book-Three return to the source must PORTAL there and MATCH the Book One Ch.14 / Book Two Ch.18 prose — do not invent a new chamber."

  the-rim:
    canonical_name: "the rim / 'the cold edge of the world'"
    aliases: ["the cold edge of everything", "the void-rim"]
    facts:
      - { fact: "the place at the edge of everything where the world's warmth thins to nothing and the abstract cold (the void) begins. Only Viridia can read it, and only with returning sight. NOT a place you travel to — a quality at the edge of the source-sense.", source: "ch-01:p123" }
      - { fact: "the void-rim DIFFERENTIAL widened 'a shade' as the weave ran full after the rebirth (Bk2 Ch.20 seed); the basis for the 'pressure differential' that PULLS the Horrors. ABSTRACT ONLY — no entity, no void woman.", source: "Bk2 Ch.20 / binding_beats" }
      - { fact: "TEARS wear open along the rim — worn-open places, NOT made doors. Count is ESCALATING (3-4 felt at ch-02; ~6-7+ and rising at ch-04). The rim is WEARING; the whole edge is leaned on at once.", source: "ch-02:p123, ch-04:p129" }

  the-hallow-bridge:
    canonical_name: "the Hallow bridge"
    facts:
      - { fact: "the bridge past Hallow; let go in winter, unmended (rail rusting, two planks gone over the beck) — the slow line ends here", source: "ch-02:p31" }
      - { fact: "site of the SECOND tear + Horror (ch-04): a tear twice the height of a man, still widening; took Dell's boy and the dog off the wall. Closed by Viridia with the Death symbol.", source: "ch-04" }

  the-emptied-hamlet:
    canonical_name: "the emptied hamlet (unnamed)"
    facts:
      - { fact: "a hamlet smaller than Wend, ~3 days north past Hallow — a dozen houses along a beck, a chapel with a fallen roof, a green with geese. EMPTIED of all cores (drained, not killed) through the FIRST tear/Horror (ch-02). Washing on a line, a pot gone to white ash, a child's wooden horse on its side.", source: "ch-02:p51-63" }

  the-leaderless-capital:
    canonical_name: "the capital (leaderless)"
    aliases: ["the city with no head"]
    facts:
      - { fact: "did not fall — STOPPED. High Chancellor dead (Bk2 Ch.17); the cutting-council scattered/dead/in hiding; the light-supremacist order unmade FROM UNDERNEATH (everyone woke whole). Bridges unmended, schools closed, intelligence service gone.", source: "ch-03:p23-27" }
      - { fact: "FACTIONS, all 'the same faction in different coats': (1) restore the old order; (2) want NO order; (3) the WORST — a 'stronger hand than the old one' to hold both halves for everyone (= the council's argument again).", source: "ch-03:p33" }
      - { fact: "new kind of killing: 'deaths with no wound' (a hand reaching into a thing's warmth and taking). The river district has started CHECKING people's hands at bridges (the sorting growing back).", source: "ch-03:p31, ch-03:p63" }
      - { fact: "news reaches Wend a WEEK STALE via two kinds of broadsheet (old grey 'Standard'/'Crown Register' vs. mismatched-type faction sheets).", source: "ch-03:p7" }

# ============================================================================
# OBJECTS / WORKINGS / RULES
# ============================================================================
objects:

  the-death-symbol:
    canonical_name: "the Death symbol (the buried mark)"
    aliases: ["the mark", "the ending thing", "the symbol for Death", "the oldest one"]
    status: chekhov_open    # carried, used twice, the central temptation of Bk3 — not resolved
    PROVENANCE:    # <<< THE LOAD-BEARING RECORD — the error that slipped through in fallback
      what_it_is: >
        The buried mark that ENDS any magic / closes any portal / unmakes any made door / turns a tear in
        the daylight into a place where nothing was ever wrong. It does NOT mend — it ENDS. Form: an UNJOINED
        RING with a single line drawn INWARD from the gap toward (but not reaching) the center. 'A door that
        will not close... and yet' — the inward line UNSAYS the making, reaching to the breath before the
        thing was made and saying 'no, once.' It does not fight the thing; it unsays it. The simplest working
        there has ever been — which is exactly why the cutting-order BURIED it (a council that means to rule
        forever does not teach the shape that ends things).
      taught_by: "DRAKE"
      taught_when: "BOOK TWO Ch.8 ('Dust to Dust') — on Drake's mountain, Viridia learning it ALONE (no witness, by choice)"
      taught_how: >
        Drake framed the whole lesson with HIS DAUGHTER'S DEATH (she flew at a torn standing door made by the
        severing-hands and was unmade to nothing; he later shut that same door with the symbol — 'one stroke,
        one breath'). His warning, made her understand BEFORE he taught her hand: 'YOU WILL HATE HOW EASY IT
        IS.' A working that ends the world's worst making and takes not one drop you can feel has taken the
        cost somewhere you cannot watch it go. He did NOT make her swear over it ('a soul that needs to swear
        over a thing this final should not hold it').
      first_used: >
        BOOK TWO Ch.10 ('The Almost') — Viridia drew it SMALL and clean in the air over the GOODS-SHED ROOF
        to KILL A TRUE-SEER'S LENS (the glass went dark mid-drink). This was its first use. (Simultaneously
        she put a spear through the window — two ways at once.)
      uses_since_then:
        - "Bk2 Ch.16: NOT spent — at Jazen's death 'the very end is not the kind the mark is for.'"
        - "Bk2 Ch.17: NOT spent — she took her hand off Jazen's arm and turned to the source instead."
        - "Bk3 Ch.2 (FIRST hamlet tear): NOT used — she closed that tear the COSTLY way (see the-two-tear-close-methods); she had carried the mark a year and refused to draw it."
        - "Bk3 Ch.4 (Hallow bridge, SECOND tear): FIRST USE TO CLOSE A TEAR — drew the mark, the tear ceased to be a tear, cost her NOTHING, every ounce of warmth still whole. This is the eerie 'asks-nothing' close, contrasted against the costly close. Raizen: 'do not enjoy how little it costs.' Her reaction: RELIEF, then 'That was easy. I could do that all day' — and 'I already want to do it again.'"
      CRITICAL_CORRECTION: >
        Viridia KNOWS and has USED the Death symbol coming INTO Book Three. She does NOT learn it fresh in
        Bk3, and it was NOT taught by Raizen. (A continuity error 'Death symbol taught by Raizen' was caught
        as CRIT-001 on Ch.4 and reframed to FIRST USE; Drake taught it, Bk2 Ch.8 — STATE.yaml scores.4.)
        In Bk3 Ch.4 Raizen only REMINDS/URGES her to draw the mark his father set in her hand.
    danger: "It asks NOTHING. 'No one alive can make you afraid of a thing that does not hurt.' The FREE GOOD thing is how you lose yourself (Raizen, ch-04:p79) — you do not weigh what does not hurt. The Bk3 spine: she must BE the wall and 'count what it costs even when it costs nothing' (Alice, ch-04:p117)."
    last_mentioned: "ch-04:p143"
    resolution: null

  the-two-tear-close-methods:
    canonical_name: "the two ways to close a tear"
    status: background    # a RULE, recorded as a tracked working-pair
    methods:
      costly:
        description: >
          Spend her OWN source-warmth into the gap, hand over hand, gathering the worn/parted threads and
          holding the warmth in place until they 'remember they were once whole' — re-knitting, not filling
          (the far side is too vast to fill). Leaves a SEAM that never goes smooth. HURTS — spends her at both
          ends (Raizen drained at the far end of the bond + the tear drinking the near). Wrings her to the wick.
        used: ["Bk2 (the rebirth = the giving writ large)", "Bk3 Ch.2 (the hamlet tear — went grey, 'spent yourself near to nothing,' per Alice)"]
        source: "ch-02:p83-87"
      free:
        description: >
          The DEATH MARK. Asks NOTHING — the tear simply ceases to be a tear; full warmth retained. 'The
          mending asks everything... this asks nothing, and the gladness is the danger.' THAT is its danger.
        used: ["Bk3 Ch.4 (the Hallow bridge tear)"]
        source: "ch-04:p41, ch-04:p55-63"
    note: "The COSTLY vs FREE contrast is the moral engine of Bk3 Act One. Mending is the harder/safer thing because it hurts and thus gets weighed; the mark gets used 'all day' because it doesn't."

  the-horrors:
    canonical_name: "the Horrors (the things through the tears)"
    aliases: ["the thing of absence"]
    status: chekhov_open
    description: >
      Man-height (and taller) MOVING ABSENCE the eye slides off and cannot hold; a place where light goes in
      and does not come back. Makes NO SOUND. Where it touches, the world goes grey/ash in a slow ring; it
      DRINKS warmth (drains cores sideways, the way water finds a drain). Has no word and is given none — the
      'cold working part' that files everything finds no word for it (its own terror).
    KEY_FACTS:
      - { fact: "NOT attacking, NOT made doors — the tears are WORN-OPEN places (the weave leaned on from the far side until it parts). The Horror is the water; the tear is the drain.", source: "ch-02:p83" }
      - { fact: "PULLED toward the source Viridia became — a PRESSURE DIFFERENTIAL vs the void (water finds a low place because the low place pulls; the direction is TOWARD the source = toward Viridia). This is the moral gut-punch: saving the world created its next threat. She keeps FILING this thought and refusing to let it arrive.", source: "ch-01:p135, ch-02:p85, binding_beats" }
      - { fact: "not fought with the body/steel (it is the absence of body). Raizen draws its 'eye' by pouring out the brightest warmth in the field; once the tear is closed and it is cut off from the far side, it comes apart (silently).", source: "ch-02:p67, ch-02:p87" }
    tear_count:
      - { at: "ch-02", value: "3-4 faint along the rim (one further along, a current beginning)" }
      - { at: "ch-04", value: "~6-7 and rising, plus a fainter one beyond and another breath beyond that — opening FASTER than she can close them" }
    last_mentioned: "ch-04:p143"
    resolution: null

  bellas-name-thread:
    canonical_name: "the thread with Bella's name"
    status: chekhov_open
    description: "A warm thread running DOWN into the source with Viridia's mother's (Bella's) name at the bottom; Viridia can sense it but cannot follow it (no bottom). Touched again at the rebirth pedestal (Bk2 Ch.18) and let go. Tied to the 'family-tree name that doesn't fit' (Lightwell's scored-out three words)."
    introduced: "Bk1/Bk2"
    last_mentioned: "carried into Bk3 (not yet on-page in Ch.1-4)"
    resolution: null
    book3_plan: "Viridia ATTEMPTS to follow it, at a cost (~Ch.13 personal climax — STATE.yaml)."

  lightwell-family-tree-page:
    canonical_name: "Lightwell's scored-out family-tree half-page"
    status: chekhov_open
    description: "Half a page of a family line in Lightwell's hand; one name does not sit in its box (the line in runs from nowhere; the line out stops); beside it three small words pencilled and SCORED OUT near to tearing — unreadable. The 'family-tree name that doesn't fit the pattern.' Was in Viridia's satchel (Bk2)."
    introduced: "Bk2 Ch.10"
    note: "Its Bk1 vehicle (the spellbook) burned in Ch.16; re-homed via Lightwell's papers. Open thread; tied to Bella's-name thread."
    resolution: null

  the-carried-tokens:
    canonical_name: "Viridia's carried tokens"
    status: background
    description: "the dark-blue mother's stone + the Heart of the Spear (Dangris, Kor-toh)."
    note: "Pact-and-Dangris resolved lightly on-page / folded into the balance finale (STATE.yaml)."

# ============================================================================
# WORLD RULES
# ============================================================================
world_rules:
  - { rule: "Setting has TRAINS and MOTORCARS. The 'slow line' (rail) runs to Hallow then stops; bridges unmended (no capital to mend them).", source: "foundation / ch-02:p31" }
  - { rule: "Magic = energy via a focus, OR Moravian writes intent directly (Viridia bypasses focus). Both-sided gift severed long ago, deliberately; mendable — and now MENDED (the rebirth).", source: "foundation" }
  - { rule: "BOTH HALVES OF THE GIFT now carried by EVERYONE (the rebirth gave them) — the bright and the dark, giving and taking. Most never trained; many found the dark half by accident (soured milk, a cracked cup). This is the whole social engine of the leaderless world.", source: "ch-01:p75" }
  - { rule: "THE SOURCE = the well of all magic; Viridia is its living VESSEL (tied to it the way it is tied to everything). Physical location = the Book One cavern (see locations/the-source-cavern). Reached by portal/seam.", source: "foundation / Bk2 Ch.18" }
  - { rule: "THE VOID = the abstract counterpart to the source. The rebirth widened the source/void PRESSURE DIFFERENTIAL ('a held breath harder to hold the fuller the lung'). NO entity, NO void woman — abstract negative only. This pulls the Horrors.", source: "Bk2 Ch.20 / binding_beats" }
  - { rule: "A made PORTAL has edges/a frame/a clean seam (someone meant it, held the Moravian steady). A TEAR has none — a worn-through place, frayed, the world stretched toward it. Ordinary eyes can see the wrongness (a heat-shimmer with no heat).", source: "ch-02:p59" }
  - { rule: "DEATH-SENSE: a natural death is a 'window closing' (clean, breathes out and back). A DRAINED death is 'pulled out' — warmth not ending but going somewhere, into an absence with a current in it. Viridia reads the difference instantly.", source: "ch-01:p113-117" }
  - { rule: "BONDING: summoned bond (Lor-ar; releasable by meaning it) vs TRUE BOND (Raizen; life-tied, dragons only). True-Bonded pair outlive almost everyone (the long-life weight).", source: "foundation" }
  - { rule: "SHADOW-WALKING: Viridia can travel anywhere shadow reaches that she has already visited.", source: "foundation" }
  - { rule: "TRUE-SEERS' lenses ('glasses of true seeing') read lit mages; the Death mark kills a lens (Bk2). Capital intelligence apparatus now defunct (leaderless).", source: "Bk2" }

