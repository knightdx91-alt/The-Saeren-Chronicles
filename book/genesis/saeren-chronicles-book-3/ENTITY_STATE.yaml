    canonical_name: "the capital factions"
    aliases: ["restore-the-order faction", "no-order faction", "the 'stronger hand' faction", "the river district (hand-checkers)"]
    facts:
      - { fact: "three factions = 'the same faction in different coats' (restore old order / no order / a stronger hand than the old one). The 'stronger hand' argument is the cutting-council's argument reborn — correct AND monstrous.", source: "ch-03:p33" }
      - { fact: "the RIVER DISTRICT faction checks people's hands at bridges (proof they can hold the dark half) — the sorting growing back.", source: "ch-03:p63" }
  the-cutting-order:
