    relationships:
      viridia-saeren: { type: "the one Viridia gives the true things to; appointed herself keeper of the one thing she trusts no one else to keep", established: "Bk1", current_status: "load-bearing; her question drives Viridia's Bk3 arc" }
    status_book3: "ALIVE, in Wend; came north with the party; 'fierce ordinary contentment' — survived on purpose on the east road."

  marick:
    canonical_name: "Marick"
    aliases: []
    importance: supporting
    needs_review: false
    introduced: "Bk2 Ch.20 (final beat seed); pays off in Book Three (NOT YET on-page in Bk3 Ch.1-4)"
    description: >
      A forty-year 'candle' (thin true-light gift) in a low stone laboratory far to the WEST; resented his
      small gift; hoarded bound volumes of deep severed-half mathematics. In the rebirth's grey morning he
      was handed the WHOLE DARK HALF of the gift unearned (Viridia made every living core whole, his too)
      and does not know why.
    role_book3: >
      RESOLVED (author 2026-06-24): MARICK is the one who OPENS the bad working/portal — finds the old
      severed-half workings now open to him, reads a near-worn-away WARNING under an old symbol, decides
      it doesn't matter, and PICKS UP THE CHALK. He is the Horror/portal TRIGGER. Distinct from Fen.
