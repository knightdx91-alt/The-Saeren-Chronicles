# LOCKED RULES / GUARDRAILS (run audits against these)
# ============================================================================
locked_guardrails:
  canon_names:
    - "Series name SINGLE-N: 'Saeren'."
    - "Alice's surname is PEMBROOK."
    - "Spelling is JAZEN (never Jasen)."
    - "Lady Lightwell wore ROSE-TINTED spectacles (now dead)."
  viridia:
    - "Silver-blonde hair, GREEN eyes, slight build 5'5\" (slight, not short)."
    - "GRIEF HELD INWARD — NO ONE sees Viridia cry. The once-in-a-life sanctioned break was Book Two Ch.16 (Jazen's death). Book Three keeps grief inward."
    - "Age MAY be stated plainly in Bk3 (she is sixteen) — the Book-Two no-number rule was only the private 14->15 turn-beat device."
  raizen:
    - "HUMAN form; eyes DARK/ORDINARY BROWN — NOT lightning-blue. Lightning-blue = his DRAGON form AND Lor-ar's marker, never the human form. (Caught + fixed as a WARN on Ch.1.)"
  death_symbol:
    - "Viridia KNOWS + has USED the Death symbol coming into Bk3 (Drake taught it Bk2 Ch.8; first used Bk2 Ch.10 on the true-glass). She does NOT learn it fresh in Bk3, and Raizen did NOT teach it. Bk3 Ch.4 is its FIRST USE TO CLOSE A TEAR. (CRIT-001 'taught by Raizen' was caught + fixed.)"
  void:
    - "DO NOT introduce Johnathan Masters or the void woman (Masters of the Void is a separate series). The void stays ABSTRACT — no entity. The ONLY connection is the binding final image; do NOT explain it."
  ya_tone:
    - "Violence = consequence, never spectacle; cut the camera on the worst acts; no explicit sex / graphic torture / adult profanity. Keep hope/connection (Raizen, Alice, chosen family) load-bearing between dark beats."
  binding_beats:
    - "KEY REVELATION: the Horrors are PULLED toward the source (not attacking) — the rebirth made a pressure differential with the void; saving the world created its next threat."
    - "RESOLUTION: BALANCE, not victory — source contained, void acknowledged as the necessary counterpart (neither good nor evil), world made sustainable. World CHANGED, not fixed."
    - "ENDING: Raizen + Viridia take the long view (True-Bond = they outlive almost everyone; carried together)."
    - "FINAL IMAGE (binding, do NOT explain): in a lab a tentacle snaps back through a portal, severed; a young man named FEN runs; and Viridia, far away, feels a VOID for the first time (a place where a core should be and is not). The thread to Masters of the Void. Let it sit."
  continuity_discipline:
    - "Before reusing any Book One/Two element (source-cavern, Death symbol, a returning character/rule), OPEN that book's prose and match it — this summary is not the source of truth for rendering. Run continuity-guardian vs BOTH earlier books before finalizing each Act-Three chapter."

