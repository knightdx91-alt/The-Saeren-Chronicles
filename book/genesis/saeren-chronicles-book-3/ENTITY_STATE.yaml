  notes: >
    Where a Book Three chapter has updated an inherited Book Two entity, the new state is recorded
    and the change is noted under `change_in_book3`. ENTITY_STATE is a SUMMARY — for how a returning
    element was actually rendered (the source-cavern, the Death symbol), open the earlier book's prose.

# ============================================================================
# CHARACTERS
# ============================================================================
characters:

  viridia-saeren:
    canonical_name: "Viridia Saeren"
    aliases: ["the girl", "the girl who remade the world", "little one (Raizen/Lor-ar only)"]
    importance: major
    physical:
      hair: { value: "silver-blonde, worn loose", source: "foundation" }
      eyes: { value: "green", source: "foundation" }
      build: { value: "slight, fine-boned, 5'5\" (slight, NOT short)", source: "foundation" }
      age: { value: 16, at_chapter: 1, source: "ch-01:p9", note: "stated plainly on-page ('She was sixteen now', ch-01:p9). Book Three MAY state her age — the Book-Two no-number rule was only for the private 14->15 turn-beat. Was 14 leaving the burning school, turned 15 in Bk2 (no number)." }
    traits:
      - { trait: "grief held inward — NO ONE sees her cry", source: "foundation", mutable: false, note: "the once-in-a-life sanctioned break was Book Two Ch.16 (Jazen's death); Book Three keeps grief inward." }
      - { trait: "the 'cold working part' — does the arithmetic so the rest of her can survive the choosing; files things she is not ready to know", source: "ch-01:p57", mutable: false }
      - { trait: "the 'careful surface' / flat hard certainty — the voice/face that holds when nothing else does", source: "ch-01:p129", mutable: true }
      - { trait: "cannot turn away from a true thing", source: "ch-03:p57", mutable: true }
    voice_markers:
      ref: "foundation/voice-dna.md#viridia"
    physical_items:
      - { item: "dark-blue stone necklace (mother's)", source: "foundation" }
      - { item: "Heart of the Spear pendant (Dangris, Kor-toh)", source: "foundation", note: "Pact-and-Dangris to be resolved lightly on-page / folded into the balance finale (STATE.yaml)." }
    status_book3:
      role: "the living VESSEL OF THE SOURCE — tied to the source the way the source is tied to everything"
      sight: >
        MANA-SIGHT SPENT to the wick in the Bk2 Ch.18 rebirth (temporary cost). RETURNING SLOWLY across
        Book Three — flickered back in autumn, unfolded through winter a layer at a time; still NOT whole,
        guttering at the edge of its reach. Reads further than a year ago, not yet as far as it will. The
        returning sight is the vehicle by which she first reads the widened void-rim and the tears.
      source_sense: >
        With the returning sight came the deeper SOURCE-SENSE (underneath sight): an always-on pressure
        under the breastbone that RISES when a core is born and EASES when one dies — the long low
        respiration of every living core there is ('the tide'). Distant ones are faceless arithmetic;
        near ones have faces (she knew old Tem went before the knock; ch-01:p61). She files it as 'weather.'
      can_still_do: "WORK magic by intent (Moravian, opening seams by meaning it) — the GIFT is intact; only the passive always-on SIGHT guttered."
      change_in_book3: "Bk2 ended with sight fully dark; by Bk3 it is partway back AND has surfaced the new source-sense (the always-on feel of births/deaths)."
    knowledge:
      - { fact: "she is whole, not broken; the severing was deliberate; she mended it for every living core at once (the rebirth)", learned: "Bk1/Bk2", method: "discovered" }
      - { fact: "knows + has USED the Death symbol (see objects/the-death-symbol) — does NOT learn it fresh in Bk3", learned: "Bk2 ch-08 (Drake taught); first used Bk2 ch-10", method: "told_by:drake" }
      - { fact: "the Horrors are PULLED toward the source she became (not attacking) — the half-finished thought she keeps filing and refusing to let arrive", learned: "ch-01 onward, refuses to fully think it", method: "inferred" }
      - { fact: "there is a widened void-rim / cold edge of the world only she can read; tears wear open along it, escalating in number", learned: "ch-01:p123 (first), ch-02:p121, ch-04:p129", method: "witnessed" }
      - { fact: "the capital is leaderless; factions; the 'stronger hand' argument (take the dark half from those who can't be trusted) — correct AND monstrous", learned: "ch-03 (stale broadsheets)", method: "discovered" }
    arc_book3: >
      The girl who refused to decide for everyone (the source's making) must now refuse a SECOND easy power:
      Vale's plea to remake the city's cores (monstrous-easy, ch-03) AND the Death symbol (good-easy, ch-04).
      Central tension: a free GOOD thing is how you lose yourself, not the obvious monstrous one. Balance,
      not victory, is the destination (binding).
    open_threads:
      - "ATTEMPTS to follow Bella's-name thread, at a cost (~Ch.13 personal climax — STATE.yaml)."
      - "Sight still recovering across the book."

  raizen:
    canonical_name: "Raizen"
    aliases: ["the rabbit (Drake's old name for him)"]
    importance: major
    species_origin: "prismatic dragon; affinity = ALL ELEMENTS (prismatic) — unusual range, carried into human form"
    physical:
      form: { value: "HUMAN — lean, dark-haired young man, tall", source: "ch-01:p19", note: "transformed Bk2 Ch.19 after the rebirth." }
      eyes:
        value: "DARK / ORDINARY BROWN (a human brown)"
        source: "ch-01:p19"
        LOCKED: true
        note: >
          CANON-CRITICAL. His lightning-blue eyes were the DRAGON form; the change (Bk2 Ch.19) dimmed
          them to ordinary brown. Lightning-blue belongs to (a) his dragon form and (b) Lor-ar's marker —
          NEVER the human form. The only place the prismatic thing still shows is in the ATTENTION behind
          the eyes, not their color.
      apple_motif: { value: "carries/turns an apple; studies 'the middle' (the unripe between flower and rot) he doesn't understand because it is the human part", source: "ch-01:p19, ch-01:p21" }
    traits:
      - { trait: "new to being human — feet, cold, balance attended as a separate task; learning to breathe like a person", source: "ch-01:p19", mutable: true }
      - { trait: "cannot stop being what he is — a faint prismatic shimmer runs off his fingers; in a fight he lets 'the light of it' off his hands (not the full dragon)", source: "ch-01:p25, ch-02:p79", mutable: false }
      - { trait: "patient, in no hurry; unhurried stride; always knows where Viridia is (the bond)", source: "ch-01:p21", mutable: false }
      - { trait: "speaks plainly, misses nothing; will not let Viridia keep saying 'I' as if alone", source: "ch-02:p21", mutable: false }
    bond: { type: "TRUE BOND with Viridia (life-tied; dragons only); the anchor at the far end of the rebirth", source: "Bk2", current_status: "intact; warmth no longer has to stretch over miles" }
    relationships:
      viridia-saeren: { type: "True-Bonded; the one she does not lie to (except small mercies he lets her keep)", established: "Bk1", current_status: "central; they live in the shape of the word 'forever' (long-life weight)" }
      drake: { type: "father", current_status: "Drake went to the mountain (Bk2 Ch.19); expects Raizen to visit" }
      varissa: { type: "mother", current_status: "went to the mountain; 'bring him to the mountain when his feet stop offending him'" }
    knowledge:
      - { fact: "a Horror is the absence of body — not fought with steel/the body; it eats warmth; he draws its 'eye' by pouring out the brightest warmth in the field", learned: "ch-02:p67", method: "inferred" }
      - { fact: "the Death symbol his father taught Viridia closes a tear and asks nothing — and the FREE GOOD thing is how you lose yourself", learned: "ch-04:p79", method: "inferred" }
    arc_book3: "the load-bearing relief/connection beat AND the moral mirror — names the danger of the free good thing (ch-04)."

  drake:
    canonical_name: "Drake"
    importance: supporting
    species_origin: "ancient dragon, ~6000 winters; pitch black; jet-black DEATH flames; affinity = DEATH"
    physical:
      form: { value: "pitch black; enormous; single banked coal-eye", source: "Bk2 ch-08" }
    traits:
      - { trait: "gruff = grief; grieves loudly from a height; lost a daughter in the last war", source: "Bk2 ch-08", mutable: false }
    role:
      provenance_taught: >
        TAUGHT VIRIDIA THE DEATH SYMBOL — Book Two Ch.8, alone on his mountain ('a thing you take like a
        wound, alone'). Framed the lesson with HIS DAUGHTER'S DEATH (she flew at a torn standing door made
        by the severing-hands and was unmade to nothing; he then shut that door with the symbol — 'one
        stroke, one breath'). Warned: 'you will hate how easy it is' — a working that ends the worst making
        and takes nothing you can feel has taken the cost somewhere you cannot watch it go. (See objects/the-death-symbol.)
      killed_meros: "Bk2 Ch.17 — killed High Chancellor Erik Meros with a single aimed jet of death-flame (spent his worst gift on a human life to clear the rifleman from his son's bond)."
    status_book3: "GONE to the mountain (Bk2 Ch.19) with Varissa. Off-page in Bk3 Ch.1-4 but vividly remembered (ch-04:p31-41 — the mountain lesson). NOT dead."
    open_threads: ["Whether Drake/Varissa return for the balance finale (open author decision, STATE.yaml)."]

  varissa:
    canonical_name: "Varissa"
    importance: minor
    species_origin: "dragon, ~5000 winters; brilliant scarlet; breathes flame"
    traits:
      - { trait: "grieves close to the ground, quiet (the inverse of Drake's loud register)", source: "Bk2", mutable: false }
    status_book3: "GONE to the mountain with Drake (Bk2 Ch.19). Off-page in Bk3 Ch.1-4."

  lor-ar:
    canonical_name: "Lor-ar"
    aliases: ["little one (his own rationed phrase, said TO Viridia)"]
    importance: minor
    species_origin: "sylvan tiger, spirit walker, ~300 years"
