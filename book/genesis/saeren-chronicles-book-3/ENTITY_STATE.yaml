  mirelle:
    canonical_name: "Mirelle"
    importance: minor
    status: "DEAD — Book Two Ch.11 (made her back into a table over the children). DO NOT resurrect."
  hiram:
    canonical_name: "Hiram Vell"
    importance: minor
    status: "DEAD — Book Two Ch.11 (set the camp's ward down slow to buy the children out; died at the anchor-post). DO NOT resurrect."
  emptied-hamlet-folk:
    canonical_name: "the hamlet (unnamed dead)"
    importance: minor
    location: "a hamlet north of Wend, past Hallow"
