    facts:
      - { fact: "six hundred years ago a council cut the world in two (severed the dark half from every core), 'for everyone's good,' and buried the Death symbol so no one could hold the shape that ends things. UNMADE from underneath by the rebirth. The moral template Viridia must NOT become.", source: "ch-03:p23, ch-04:p33 / foundation" }

