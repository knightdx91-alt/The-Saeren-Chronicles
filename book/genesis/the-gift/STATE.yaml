project:
  title: "The Gift"
  genre: "Science fiction thriller"
  subgenre: "Near-future biopunk / superhuman-origin thriller with romance (multi-POV)"
  language: "English"
  word_count_target: 100000
  comp_titles: []
  engagement_type: {primary: "", secondary: "", tertiary: ""}
  premise: "A genetics prodigy who cracks the 'mutant gene' and gives himself and his two closest people superhuman powers builds a biotech empire whose real, hidden purpose is to seed humanity on another world — at any cost — until a grieving government investigator and the price of their own ambition close in."
  created: "2026-06-21"
  updated: "2026-06-21"

# Hybrid run: author supplied a finished Chapter 1 (AO3) + detailed continuation notes.
# Architect builds foundation + outline + voice-dna FROM those; Ch.1 prose is the voice benchmark.
adaptation:
  mode: "genesis-from-opening+notes"
  canon_sources:
    original_draft: "research/original-draft.txt"               # AO3 Ch.1 = voice benchmark + seed canon
    continuation_notes: "research/author-continuation-notes.md" # author's plan for Ch.2 onward (canon intent)
  chapter_1_locked: false   # Ch.1 is the VOICE BENCHMARK; may be polished, preserve its voice
  chapters_to_produce: []   # set after architect builds the outline

