last_updated_chapter: 17   # Ch.17 finalized (THE DECISION; gate-clean, 5,060w, em-dash 1, RESULT: clean, rhythm: only sanctioned action/pressure anaphora flagged in Ch.17). PAST RESTRAINT, VIRIDIA CHOOSES THE UNFORGIVABLE THING: spent/broken/kneeling, she makes the choice she swore to avoid (the Ch.12 vow to Lor-ar; Amber's Ch.9 question) — she will MEND THE SEVERING FOR EVERYONE, UNASKED, in a single stroke, because every other door is shut and the bodies are real; she chooses it WHOLE (no cold part left to carry it), with no answer to Amber's question, carrying the unaskedness alone forever. THE CHANCELLOR MOVES TO END HER (raises a gate rifleman at the kneeling girl) — and DRAKE drops out of the sky and KILLS ERIK MEROS with a single aimed jet of death-flame (touches no one else; the message-making capital loses its head in the open; glasses of true seeing find nothing left to read). [BINDING: HIGH CHANCELLOR ERIK MEROS IS DEAD by Drake's death-flames — a scorch on the flag.] DRAKE'S COST: spent the worst gift he owns (used rarely/exactly/never cheap) on a human life, broke his own discipline, because the rifleman stood between his son's far end (True-Bond) and the well; grieves loud and leaves. With the threat gone the resistance stops breaking (an army built around a man doesn't know what it's for once the man is gone). Viridia takes her hand off Jazen's arm (does NOT spend the Death-symbol — the very end is not the kind the mark is for), gets up, turns to the SOURCE: the lattice lit, the broken cores on half their wick, the well behind/under/through it. END HOOK: with Amber's question unanswered beside her and Raizen braced at the far end of the True-Bond, she REACHES FOR THE WELL OF ALL MAGIC. (Bella's-name-thread NOT touched; rebirth/mending NOT performed — only reached for = Ch.18.) Alice present, freed at the iron line's tail (crooked tooth, lank blond hair, calm hands), watching. # Ch.16 finalized (THE HINGE; gate-clean, 5,562w, em-dash 3, RESULT: clean, rhythm: 0 flagged in Ch.16). JAZEN IS DEAD — taken alive (a smother/net-working of the broad gift, drilled by 3 coarse-gift men, guttered his rising), forced to his knees, and BEHEADED by Erik Meros before both armies, quickly, as a message, the silver-framed true-glasses watching. Both armies see; Viridia sees. THE BANKED BREAKDOWN BREAKS ON THE PAGE: her cold working part fails (no heading survives the one she swore to keep), she WEEPS openly before both armies (first time anyone sees her cry — pays off Bella's 'be careful who you let see you do it'). FURNACE SPENT: it goes up unleashed, finds the world's lattice of broken cores (would hit children/captives/all, not just Meros — 'does not count heads'), so with her last fragment she does not aim it — TURNS the whole of it harmless straight UP into the empty sky (a nameless column of source-light both armies witness). Chancellor LEFT ALIVE (her mercy-to-spare-the-children spared him too; she has nothing left to take him with) — intact for Ch.17 (Drake's kill). DEATH-SYMBOL NOT spent (cold place broken open, faces all loose, the very end 'not the kind the mark is for'). END HOOK: in the broken-open silence she STOPS BEING CAREFUL who sees what she is — careful face gone forever, kneeling with her hand on Jazen's arm where she swore to keep it, letting the whole grey world look at her grief. Alice present at the tail of the iron line (freed, unmoving). Hand-on-arm promise paid off as failure (she was the leash too late). # Ch.15 finalized (gate-clean, 4,936w, em-dash 2, RESULT: clean, rhythm: only sanctioned action-anaphora flagged) — PARALLEL: rescue cut against Jazen's charge. The angle of the grey light decides FOR her: the shadow-road reaches only Alice, NOT Jazen (no shadow on the open field), so her one fast road serves the one she meant to fail. She runs the slow human way at Jazen, nearly reaches his arm — then a CAPTIVE screams his name and he breaks into a run she can't catch. She shadow-walks to the rise instead (kills 4 guards, NO furnace/NO Death symbol — both held), frees Alice: ALIVE but CHANGED — calm hands, even voice, 'they needed my hands,' will not take Viridia's hand, says 'you shouldn't have come up here' / 'he's not going to make it.' Viridia leaves her to bar Jazen; opens a cold door in the enemy fire-wall for him; HE WALKS INTO THE FIRE (unleashed, untouched) and past her, the wrong door. END HOOK: she reaches BOTH too late — Alice unreachable in her change, Jazen climbing into the Chancellor's trap (the parade was a hook; Meros is PLEASED) — Viridia running the long way round, too late, into Ch.16. Grief STILL inward (no tears — banked for Ch.16). Death symbol STILL in reserve. # Ch.14 finalized (gate-clean, 4,641w, em-dash 2) — ACT THREE opens, the battle joins: parley refused ('No'), capital opens with rolling fire not a charge; Viridia spends her 4 Damascus spears + furnace IN THE OPEN (measured, never all of it) — DEATH SYMBOL STILL UNUSED, held in reserve. Hiram/Mirelle avenged; an unnamed boy + others fall. BRUTUS DIES ON THE FIELD on his feet, the burning roof-beam held over the children as the last roof (pays off his Bk1 fear of dying hidden/safe). Grief stays inward (no crying — banked for Ch.16). END HOOK: Viridia sees the shadow-road up the rise to Alice (captives pulled onto the low rise, out of reach) AND Jazen breaking toward the Chancellor against the plan — spear or leash, not both. # Ch.13 finalized (gate-clean, 4,695w) — END OF ACT TWO: the march & the walls; Jazen's fullest turn (salt-road confession, the leash/walls fear) + the hand-on-arm promise planted; both armies face off, Chancellor rides out with Alice + captives in chains. Ch.12 finalized (gate-clean, 4,649w) — Goodbyes: Drake&Varissa farewell Raizen; Viridia's private vow to Lor-ar; turn-to-15 placed (no number); column takes the road. Ch.11 finalized (gate-clean, 4,600w) — camp found & destroyed; Mirelle+Hiram dead, Brutus mortally hurt; the march begins from the ash. Ch.10 finalized (gate-clean, 5,290w). Ch.1-5 agent-drafted; Ch.6-9 ADOPTED from epic branch + age-scrubbed (2026-06-22), gate-clean, Genesis Floor >=8.6, continuity 0 critical. Body below is forward-plan/canon (binding).
