  premise: "A medical resident who has seen Death since she was nine learns she is the reincarnated wife of Acheron — the man who became Death — and must decide whether to take up the mantle of Lady Death, just as the deposed Old Gods (and the mysterious powers that stripped them) move to reclaim their abandoned domains."
  created: "2026-06-21"
  updated: "2026-06-21"

# Hybrid run: author supplied an OPENING SCENE (voice benchmark) but no plot roadmap.
# Architect builds foundation + outline + voice-dna FROM that opening; Ch.1 is benchmark prose.
adaptation:
  mode: "genesis-from-opening"
  canon_sources:
    original_draft:  "research/original-draft.txt"   # author's opening scene = voice benchmark + seed canon
  chapter_1_locked: false        # opening is the VOICE BENCHMARK; may be polished but preserve its voice
  chapters_to_produce: []        # set after architect builds the outline

