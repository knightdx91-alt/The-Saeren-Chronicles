  <text x="162" y="796" fill="#17324D" font-size="30" font-family="Georgia, serif">Diagnostic Engine</text>
  <text x="162" y="838" fill="#6E7985" font-size="22" font-family="Arial, sans-serif">Infer the manuscript's contract, then diagnose</text>
  <text x="162" y="868" fill="#6E7985" font-size="22" font-family="Arial, sans-serif">structure, pacing, reveal economy, and character.</text>
  <rect x="552" y="740" width="386" height="138" rx="28" fill="#F8F2E6"/>
  <text x="588" y="796" fill="#17324D" font-size="30" font-family="Georgia, serif">Specialized Audits</text>
  <text x="588" y="838" fill="#6E7985" font-size="22" font-family="Arial, sans-serif">Shelf positioning, AI prose calibration, genre</text>
  <text x="588" y="868" fill="#6E7985" font-size="22" font-family="Arial, sans-serif">layers, tags, research, and deeper craft analysis.</text>
