  <text x="1014" y="796" fill="#17324D" font-size="30" font-family="Georgia, serif">Firewall</text>
  <text x="1014" y="838" fill="#17324D" font-size="22" font-family="Arial, sans-serif">Diagnose what the manuscript is doing and what</text>
