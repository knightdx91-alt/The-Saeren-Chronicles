  <text x="394" y="286" fill="#D8C7AE" font-size="34" font-family="Arial, sans-serif" letter-spacing="4">DEVELOPMENTAL EDITING</text>
  <text x="126" y="410" fill="#F8F2E6" font-size="58" font-family="Georgia, serif">Developmental editing</text>
  <text x="126" y="478" fill="#F8F2E6" font-size="58" font-family="Georgia, serif">that listens before diagnosing.</text>
  <text x="126" y="548" fill="#D8C7AE" font-size="28" font-family="Arial, sans-serif">Structural diagnosis, plot coaching, specialized audits, and revision planning</text>
  <text x="126" y="586" fill="#D8C7AE" font-size="28" font-family="Arial, sans-serif">for fiction and narrative nonfiction, all behind a strict no-rewrite firewall.</text>
