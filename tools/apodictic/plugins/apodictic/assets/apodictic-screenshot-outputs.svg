  <text x="712" y="648" fill="#17324D" font-size="34" font-family="Georgia, serif">Design Constraint</text>
  <text x="712" y="714" fill="#17324D" font-size="28" font-family="Arial, sans-serif">Diagnose structure. Name options. Do not rewrite prose.</text>
  <text x="712" y="766" fill="#6A7786" font-size="22" font-family="Arial, sans-serif">APODICTIC stays on the editorial side of the firewall and hands the work back to the writer with sharper diagnosis, clearer sequencing, and better revision decisions.</text>
